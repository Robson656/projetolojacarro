<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Fomulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
                <form onsubmit="event">
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block" placeholder="Digite um título" minlength="1" maxlength="30" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="Preço do veiculo" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Marca do veiculo" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" class="block" placeholder="Faça a descrição do seu veiculo"></textarea>
                    </div>
                    <div class="caixaInputs">
                        <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Modelo do veiculo" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="kilometragem" id="kilometragem" class="block" placeholder="kilometragem do veiculo" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="data-compra">data de compra <span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>
                    <div class="caixaInputs">
                        <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="auto">
                        <label for="auto">Automatico</label>
                    </div>
                    
                    <div class="caixaOpcional">
                        <p>Opcionais</p>
                        <ul class="listaOpcionais">
                            <li><input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                         <li>
                            <input type="checkbox" name="opcional[]" id="ac" value="ac">
                            <label for="ac">Ar condicionado</label>
                         </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="camera-re" value="camera-re">
                            <label for="camera-re">Câmera de ré</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        </ul>
                    </div>
                    <div class="caixaOpcional">
                        <ul class="listaOpcionais">
                            <li><input type="checkbox" name="opcional[]" id="assistente-pista" value="assistente-pista">
                                <label for="assistente-pista">Assistente de pista</label></li>
                            <li><input type="checkbox" name="opcional[]" id="patidaSemChave" value="patidaSemChave">
                                <label for="patidaSemChave">Partida sem chave</label></li>
                            <li><input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Interação com o celular</label></li>
                            <li><input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro">
                                <label for="banco-couro">Banco de couro</label></li>
                        </ul>
                    </div>
                    <div class="caixaInputs">
                        <p>Fotos do carro <span class="campo-obrigatorio"></span></p>
                        <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg" required>
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
                <hr>
                <h2>Carros Cadastados</h2>
                <div id="listarCarros"></div>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="script/script.js">
</body>
</html>>
